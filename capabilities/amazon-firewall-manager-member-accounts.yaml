naftiko: 1.0.0-alpha2
info:
  label: AWS Firewall Manager API — Member Accounts
  description: 'AWS Firewall Manager API — Member Accounts. 1 operations. Lead operation: List Member Accounts. Self-contained
    Naftiko capability covering one Amazon Firewall Manager business surface.'
  tags:
  - Amazon Firewall Manager
  - Member Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_FIREWALL_MANAGER_API_KEY: AMAZON_FIREWALL_MANAGER_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-firewall-manager-member-accounts
    baseUri: https://fms.{region}.amazonaws.com
    description: AWS Firewall Manager API — Member Accounts business capability. Self-contained, no shared references.
    resources:
    - name: fms-2018-01-01-member-account
      path: /fms/2018-01-01/member-account
      operations:
      - name: listmemberaccounts
        method: GET
        description: List Member Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: nextToken
          in: query
          type: string
          description: Pagination token.
        - name: maxResults
          in: query
          type: integer
          description: Maximum number of accounts to return.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_FIREWALL_MANAGER_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-firewall-manager-member-accounts-rest
    port: 8080
    description: REST adapter for AWS Firewall Manager API — Member Accounts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/fms/2018-01-01/member-account
      name: fms-2018-01-01-member-account
      description: REST surface for fms-2018-01-01-member-account.
      operations:
      - method: GET
        name: listmemberaccounts
        description: List Member Accounts
        call: amazon-firewall-manager-member-accounts.listmemberaccounts
        with:
          nextToken: rest.nextToken
          maxResults: rest.maxResults
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-firewall-manager-member-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for AWS Firewall Manager API — Member Accounts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-member-accounts
      description: List Member Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-firewall-manager-member-accounts.listmemberaccounts
      with:
        nextToken: tools.nextToken
        maxResults: tools.maxResults
      outputParameters:
      - type: object
        mapping: $.
