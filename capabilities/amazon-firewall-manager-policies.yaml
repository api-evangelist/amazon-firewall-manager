      path: /fms/2018-01-01/policies/{policyId}
      operations:
      - name: getpolicy
        method: GET
        description: Get Policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: policyId
          in: path
          type: string
          description: The ID of the policy.
          required: true
