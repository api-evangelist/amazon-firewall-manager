    resources:
    - name: fms-2018-01-01-policies
      path: /fms/2018-01-01/policies
      operations:
      - name: listpolicies
        method: GET
        description: List Policies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxResults
          in: query
          type: integer
          description: Maximum number of policies to return.
        - name: nextToken
          in: query
          type: string
          description: Pagination token.
      - name: putpolicy
        method: POST
        description: Put Policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
