naftiko: 1.0.0-alpha1
info:
  label: Amazon Firewall Manager
  tags:
  - Security
  - Firewall
  - AWS
  - Compliance
  - Multi-Account
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - type: http
    namespace: fms
    baseUri: https://fms.{AWS_REGION}.amazonaws.com
    authentication:
      type: apikey
      key: Authorization
  exposes:
  - type: rest
    port: 8100
  - type: mcp
    port: 9100
