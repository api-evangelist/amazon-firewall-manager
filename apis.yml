aid: amazon-firewall-manager
name: Amazon Firewall Manager
description: >-
  AWS Firewall Manager is a security management service that allows you to
  centrally configure and manage firewall rules across your accounts and
  applications in AWS Organizations. It makes it easier to bring new
  applications and resources into compliance with security policies.
